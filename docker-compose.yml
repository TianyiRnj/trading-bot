services:
  postgres:
    image: postgres:16
    container_name: musashi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-musashi_trading_bot}
      POSTGRES_USER: ${POSTGRES_USER:-musashi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-musashi_dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-musashi} -d ${POSTGRES_DB:-musashi_trading_bot}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
